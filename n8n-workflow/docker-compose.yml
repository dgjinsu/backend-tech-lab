services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: pwm-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- 접속/웹훅 ---
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # 폼/웹훅 URL의 베이스. 팀원이 실제 접속하는 주소와 반드시 일치해야 함.
      - WEBHOOK_URL=http://localhost:5678/
      # http://localhost 접속 시 로그인 쿠키 차단 방지 (로컬 전용)
      - N8N_SECURE_COOKIE=false

      # --- 타임존 (요구사항: Asia/Seoul) ---
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul

      # --- 자격증명 암호화 키 ---
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # --- 기타 ---
      - N8N_RUNNERS_ENABLED=true          # 최신 n8n 권장 (Code 노드 task runner)
      - N8N_DIAGNOSTICS_ENABLED=false     # 텔레메트리 비활성화
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./files:/files

volumes:
  n8n_data:
