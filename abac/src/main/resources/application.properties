spring.application.name=abac
server.port=8090

# --- DataSource (H2 in-memory) ---
spring.datasource.url=jdbc:h2:mem:abacdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=abac-learning-project-super-secret-key-please-change-me-32+bytes
jwt.expire-ms=3600000

# --- Logging ---
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
